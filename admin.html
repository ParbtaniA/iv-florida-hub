<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Florida — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #F5F3EF; color: #0B1F35; min-height: 100vh; }
.topbar { background: #0B1F35; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.topbar-brand { font-size: 15px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px; }
.topbar-brand span { color: #01DC82; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-user { font-size: 12px; color: rgba(255,255,255,0.5); }
.btn-logout { font-size: 12px; color: rgba(255,255,255,0.4); background: none; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 5px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: border-color 0.15s; }
.btn-logout:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
.content { max-width: 760px; margin: 0 auto; padding: 40px 24px; }
.page-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.page-sub { font-size: 14px; color: #64748B; margin-bottom: 32px; }
.empty-state { background: #fff; border: 1px solid #E8E5DF; border-radius: 14px; padding: 60px 24px; text-align: center; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.empty-state p { font-size: 13px; color: #64748B; }
.request-card { background: #fff; border: 1px solid #E8E5DF; border-radius: 14px; padding: 22px 24px; margin-bottom: 14px; }
.request-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
.request-filename { font-size: 15px; font-weight: 600; line-height: 1.3; }
.request-time { font-size: 11px; color: #A0AEC0; white-space: nowrap; margin-top: 2px; font-family: 'DM Mono', monospace; }
.request-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.meta-pill { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 99px; background: #F5F3EF; color: #64748B; border: 1px solid #E8E5DF; }
.meta-pill.target { background: #EDF4F0; color: #0B5E38; border-color: #d0e8db; }
.request-reason { font-size: 13px; color: #64748B; background: #F5F3EF; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; line-height: 1.5; }
.request-actions { display: flex; gap: 10px; }
.btn-approve { background: #0B1F35; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
.btn-approve:hover { background: #0d2840; }
.btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-reject { background: none; color: #DC2626; border: 1px solid #FCA5A5; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
.btn-reject:hover { background: #FEF2F2; }
.btn-reject:disabled { opacity: 0.5; cursor: not-allowed; }
.done-badge { font-size: 12px; font-weight: 500; color: #059669; background: #ECFDF5; padding: 5px 12px; border-radius: 99px; }
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #F5F3EF; }
.login-card { background: #fff; border: 1px solid #E8E5DF; border-radius: 20px; padding: 48px 40px; width: 380px; text-align: center; box-shadow: 0 4px 24px rgba(11,31,53,0.08); }
.login-logo { width: 52px; height: 52px; background: #0B1F35; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.login-logo svg { width: 26px; height: 26px; }
.login-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.login-card p { font-size: 13px; color: #64748B; margin-bottom: 28px; line-height: 1.5; }
.btn-google { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; background: #fff; border: 1px solid #E8E5DF; border-radius: 10px; font-size: 14px; font-weight: 500; color: #0B1F35; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; transition: border-color 0.15s, box-shadow 0.15s; }
.btn-google:hover { border-color: #D0CCC4; box-shadow: 0 2px 8px rgba(11,31,53,0.08); }
.error-msg { background: #FEF2F2; color: #DC2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 20px; }
.loading { text-align: center; padding: 60px; color: #A0AEC0; font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 2px solid #E8E5DF; border-top-color: #0B1F35; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app"></div>

<script>
const params = new URLSearchParams(window.location.search);
const authError = params.get('error');
const authed = params.get('authed');

async function checkAuth() {
  try {
    const r = await fetch('/.netlify/functions/get-requests', { credentials: 'include' });
    if (r.status === 401) return false;
    return await r.json();
  } catch { return false; }
}

function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#01DC82" stroke-width="2" stroke-linecap="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h2>IV Florida Admin</h2>
        <p>Sign in with your Google account to review and approve document move requests.</p>
        ${authError === 'unauthorized' ? '<div class="error-msg">Access denied — only the regional coordinator can log in.</div>' : ''}
        ${authError === 'access_denied' ? '<div class="error-msg">Sign-in was cancelled.</div>' : ''}
        <a class="btn-google" href="/.netlify/functions/auth-callback">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </a>
      </div>
    </div>`;
}

function renderDashboard(data) {
  const requests = data.requests || [];
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-brand">IV Florida <span>Admin</span></div>
      <div class="topbar-right">
        <span class="topbar-user" id="user-email"></span>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
    </div>
    <div class="content">
      <div class="page-title">Move Requests</div>
      <div class="page-sub">${requests.length} pending request${requests.length !== 1 ? 's' : ''}</div>
      <div id="requests-list">
        ${requests.length === 0 ? `
          <div class="empty-state">
            <div class="empty-icon">📂</div>
            <h3>No pending requests</h3>
            <p>When a volunteer requests a file move, it will appear here for your review.</p>
          </div>` :
          requests.map(req => `
            <div class="request-card" id="card-${req.id}">
              <div class="request-header">
                <div>
                  <div class="request-filename">${req.fileName}</div>
                </div>
                <div class="request-time">${new Date(req.createdAt).toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'})}</div>
              </div>
              <div class="request-meta">
                <span class="meta-pill">Move to → <strong>${req.targetCategory.toUpperCase()} / ${req.targetCenter}</strong></span>
              </div>
              ${req.reason ? `<div class="request-reason">"${req.reason}"</div>` : ''}
              <div class="request-actions">
                <button class="btn-approve" onclick="approve('${req.id}', this)">✓ Approve &amp; Move</button>
                <button class="btn-reject" onclick="reject('${req.id}', this)">✕ Reject</button>
              </div>
            </div>`).join('')
        }
      </div>

      <div class="page-title" style="margin-top:40px">Pending Links &amp; Sections</div>
      <div class="page-sub" id="pending-links-sub">Loading…</div>
      <div id="pending-links-list"><div class="empty-state" style="padding:20px 0"><div class="empty-icon">🔗</div><p>Loading pending links…</p></div></div>

      <div class="page-title" style="margin-top:40px">Duplicate Detection</div>
      <div class="page-sub">Scans all 20 center folders and all link stores for duplicates. Keeps the newest copy, removes the rest.</div>
      <div style="display:flex;gap:10px;margin:12px 0 16px;flex-wrap:wrap;">
        <button onclick="runDedup('scan')" id="dedup-scan-btn" style="background:#0B1F35;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;">🔍 Scan for duplicates</button>
        <button onclick="runDedup('delete')" id="dedup-delete-btn" style="display:none;background:#DC2626;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;">🗑 Remove all duplicates</button>
      </div>
      <div id="dedup-result"></div>
    </div>`;

  loadPendingLinks();
}

async function approve(requestId, btn) {
  btn.disabled = true; btn.textContent = 'Moving…';
  const card = document.getElementById('card-' + requestId);
  card.querySelector('.btn-reject').disabled = true;
  try {
    const r = await fetch('/.netlify/functions/approve-move', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requestId })
    });
    const data = await r.json();
    if (data.success) {
      card.querySelector('.request-actions').innerHTML = '<span class="done-badge">✓ Moved successfully</span>';
    } else throw new Error(data.error);
  } catch(err) {
    btn.disabled = false; btn.textContent = '✓ Approve & Move';
    card.querySelector('.btn-reject').disabled = false;
    alert('Error: ' + err.message);
  }
}

async function reject(requestId, btn) {
  if (!confirm('Reject this move request?')) return;
  btn.disabled = true; btn.textContent = 'Rejecting…';
  const card = document.getElementById('card-' + requestId);
  card.querySelector('.btn-approve').disabled = true;
  try {
    const r = await fetch('/.netlify/functions/reject-move', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requestId })
    });
    const data = await r.json();
    if (data.success) {
      card.querySelector('.request-actions').innerHTML = '<span style="font-size:12px;color:#A0AEC0">Request rejected</span>';
    } else throw new Error(data.error);
  } catch(err) {
    btn.disabled = false; btn.textContent = '✕ Reject';
    card.querySelector('.btn-approve').disabled = false;
    alert('Error: ' + err.message);
  }
}

function logout() {
  document.cookie = 'iv_admin=; Path=/; Max-Age=0';
  window.location.reload();
}

async function loadPendingLinks() {
  const sub = document.getElementById('pending-links-sub');
  const list = document.getElementById('pending-links-list');
  if (!sub || !list) return;

  try {
    const r = await fetch('/.netlify/functions/get-links?store=pending', { credentials: 'include' });
    const data = await r.json();
    const links = data.links || [];

    sub.textContent = links.length + ' pending link' + (links.length !== 1 ? 's' : '');

    if (links.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔗</div><h3>No pending links</h3><p>When a volunteer submits a link for a new or unknown section, it will appear here.</p></div>';
      return;
    }

    const sel = (id, opts) => `<select id="${id}" style="flex:1;border:1.5px solid #E2E8F0;border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;background:#fff;">${opts}</select>`;

    list.innerHTML = links.map(l => {
      // Parse suggestion from note
      let suggestedDest = '', suggestedSection = '', suggestedLabel = '';
      if (l.note) {
        const regionalMatch = l.note.match(/regional section proposed:\s*(.+)/i);
        const categoryMatch = l.note.match(/category proposed:\s*(.+)/i);
        const customMatch   = l.note.match(/^(.+)$/i);
        if (regionalMatch) { suggestedDest = 'regional'; suggestedSection = regionalMatch[1].trim(); suggestedLabel = `Regional Docs → "${suggestedSection}"`; }
        else if (categoryMatch) { suggestedDest = 'center'; suggestedSection = categoryMatch[1].trim(); suggestedLabel = `New category → "${suggestedSection}"`; }
        else if (l.customSection) { suggestedLabel = l.note; }
      }
      if (l.centerHint) suggestedLabel += l.centerHint ? ` (${l.centerHint})` : '';

      return `
      <div class="request-card" id="lcard-${l.id}">
        <div class="request-header">
          <div class="request-filename">${l.name}</div>
          <div class="request-time">${new Date(l.createdAt).toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'})}</div>
        </div>
        <div class="request-meta">
          <a href="${l.url}" target="_blank" rel="noopener" style="color:#0B1F35;font-size:12px;word-break:break-all;">${l.url} ↗</a>
        </div>
        ${suggestedLabel ? `
          <div style="margin-top:10px;padding:10px 12px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;font-size:12px;color:#1E40AF;line-height:1.5;">
            <span style="font-weight:600;">💡 Suggested placement:</span> ${suggestedLabel}
          </div>` : (l.note ? `<div class="request-reason">"${l.note}"</div>` : '')}
        <div style="margin-top:12px;background:#F8F9FA;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;">
          <div style="font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:0.06em;">Place this link in:</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${sel(`ltype-${l.id}`,
              `<option value="">Destination…</option><option value="regional"${suggestedDest==='regional'?' selected':''}>Regional Docs</option><option value="center"${suggestedDest==='center'?' selected':''}>Category / Center</option>`
            )}
          </div>
          <div id="lplace-regional-${l.id}" style="display:${suggestedDest==='regional'?'flex':'none'};flex-direction:column;gap:8px;">
            ${sel(`lsec-${l.id}`,
              `<option value="">Section…</option><option value="SOPs">SOPs</option><option value="Driving">Driving</option><option value="Procedures">Procedures</option><option value="General">General</option><option value="__new__"${suggestedDest==='regional'?' selected':''}>+ Create new section…</option>`
            )}
            <input id="lsec-new-${l.id}" type="text" placeholder="New section name…" value="${suggestedDest==='regional' ? suggestedSection : ''}" style="display:${suggestedDest==='regional'?'block':'none'};border:1.5px solid #F59E0B;border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none;width:100%;box-sizing:border-box;" />
          </div>
          <div id="lplace-center-${l.id}" style="display:${suggestedDest==='center'?'flex':'none'};flex-direction:column;gap:8px;">
            ${sel(`lcat-${l.id}`,
              `<option value="">Category…</option><option value="eop">EOP</option><option value="safety">Safety</option><option value="rec">REC</option><option value="camps">Camps</option><option value="__new__"${suggestedDest==='center'?' selected':''}>+ Create new category…</option>`
            )}
            <input id="lcat-new-${l.id}" type="text" placeholder="New category name…" value="${suggestedDest==='center' ? suggestedSection : ''}" style="display:${suggestedDest==='center'?'block':'none'};border:1.5px solid #F59E0B;border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none;width:100%;box-sizing:border-box;" />
            ${sel(`lctr-${l.id}`,
              '<option value="">Center…</option><option value="Miami">Miami</option><option value="FtLauderdale">Ft. Lauderdale</option><option value="Orlando">Orlando</option><option value="Tampa">Tampa</option><option value="Ocala">Ocala</option>'
            )}
          </div>
          <div id="lplace-msg-${l.id}" style="font-size:11px;color:#DC2626;display:none;">Please select a destination.</div>
        </div>
        <div class="request-actions">
          <button class="btn-approve" onclick="placeLink('${l.id}', '${l.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}', '${l.url}', this)">✓ Place &amp; Approve</button>
          <button class="btn-reject" onclick="dismissLink('${l.id}', 'rejected', this)">✕ Reject</button>
        </div>
      </div>`;
    }).join('');

    // Wire up destination selects
    links.forEach(l => {
      document.getElementById(`ltype-${l.id}`).addEventListener('change', function() {
        const reg = document.getElementById(`lplace-regional-${l.id}`);
        reg.style.display = this.value === 'regional' ? 'flex' : 'none';
        reg.style.flexDirection = 'column';
        const cc = document.getElementById(`lplace-center-${l.id}`);
        cc.style.display = this.value === 'center' ? 'flex' : 'none';
      });
      document.getElementById(`lsec-${l.id}`).addEventListener('change', function() {
        document.getElementById(`lsec-new-${l.id}`).style.display = this.value === '__new__' ? 'block' : 'none';
      });
      document.getElementById(`lcat-${l.id}`).addEventListener('change', function() {
        document.getElementById(`lcat-new-${l.id}`).style.display = this.value === '__new__' ? 'block' : 'none';
      });
    });

  } catch(err) {
    if (sub) sub.textContent = 'Could not load pending links';
  }
}

async function placeLink(linkId, name, url, btn) {
  const card = document.getElementById('lcard-' + linkId);
  const msg = document.getElementById('lplace-msg-' + linkId);
  msg.style.display = 'none';

  const dest = document.getElementById('ltype-' + linkId)?.value;
  const sectionSel = document.getElementById('lsec-' + linkId)?.value;
  const sectionNew = document.getElementById('lsec-new-' + linkId)?.value.trim();
  const section = sectionSel === '__new__' ? sectionNew : sectionSel;

  const catSel = document.getElementById('lcat-' + linkId)?.value;
  const catNew = document.getElementById('lcat-new-' + linkId)?.value.trim();
  const category = catSel === '__new__' ? catNew : catSel;
  const center = document.getElementById('lctr-' + linkId)?.value;

  if (!dest
    || (dest === 'regional' && !section)
    || (dest === 'center' && (!category || !center))) {
    msg.style.display = 'block';
    msg.textContent = 'Please fill in all required fields.';
    return;
  }

  btn.disabled = true; btn.textContent = 'Placing…';
  card.querySelectorAll('button').forEach(b => b.disabled = true);

  try {
    const payload = { name, url, destination: dest, force: true };
    if (dest === 'regional') payload.section = section;
    if (dest === 'center') { payload.category = category; payload.center = center; }

    const saveResp = await fetch('/.netlify/functions/save-link', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const saveData = await saveResp.json();
    if (!saveData.success) throw new Error(saveData.error || 'Save failed');

    await fetch('/.netlify/functions/delete-link', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ linkId, store: 'links-pending' })
    });

    const dest_label = dest === 'regional' ? `Regional / ${section}` : `${category.toUpperCase()} / ${center}`;
    card.querySelector('.request-actions').innerHTML = `<span class="done-badge">✓ Placed in ${dest_label}</span>`;
  } catch(err) {
    card.querySelectorAll('button').forEach(b => b.disabled = false);
    btn.textContent = '✓ Place & Approve';
    msg.style.display = 'block'; msg.textContent = 'Error: ' + err.message;
  }
}

async function dismissLink(linkId, action, btn) {
  const card = document.getElementById('lcard-' + linkId);
  btn.disabled = true;
  card.querySelectorAll('button').forEach(b => b.disabled = true);
  try {
    const r = await fetch('/.netlify/functions/delete-link', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ linkId, store: 'links-pending' })
    });
    const data = await r.json();
    if (data.success) {
      card.querySelector('.request-actions').innerHTML = '<span style="font-size:12px;color:#A0AEC0">Rejected</span>';
    } else throw new Error(data.error);
  } catch(err) {
    card.querySelectorAll('button').forEach(b => b.disabled = false);
    alert('Error: ' + err.message);
  }
}

async function runDedup(action) {
  const resultEl = document.getElementById('dedup-result');
  const scanBtn = document.getElementById('dedup-scan-btn');
  const deleteBtn = document.getElementById('dedup-delete-btn');

  scanBtn.disabled = true;
  scanBtn.textContent = action === 'scan' ? '🔍 Scanning…' : '🔍 Scan for duplicates';
  if (deleteBtn) { deleteBtn.disabled = true; deleteBtn.textContent = '🗑 Removing…'; }
  resultEl.innerHTML = '<div class="empty-state" style="padding:16px 0"><div class="spinner"></div><p style="margin-top:8px;color:#64748B;">' + (action === 'scan' ? 'Scanning all folders and link stores…' : 'Removing duplicates…') + '</p></div>';

  try {
    const resp = await fetch('/.netlify/functions/dedup-scan', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action })
    });
    const data = await resp.json();
    if (data.error && !data.fileDuplicates) throw new Error(data.error);

    const fileDups = data.fileDuplicates || [];
    const linkDups = data.linkDuplicates || [];
    const totalDups = fileDups.length + linkDups.length;

    if (action === 'delete') {
      resultEl.innerHTML = `
        <div style="background:#ECFDF5;border:1px solid #6EE7B7;border-radius:8px;padding:14px 16px;font-size:13px;color:#065F46;">
          ✓ Done. <strong>${data.deleted || 0}</strong> duplicate${data.deleted !== 1 ? 's' : ''} removed.
          ${data.errors?.length ? `<br><span style="color:#DC2626">${data.errors.length} error(s): ${data.errors.slice(0,3).join(', ')}</span>` : ''}
        </div>`;
      if (deleteBtn) deleteBtn.style.display = 'none';
      scanBtn.disabled = false; scanBtn.textContent = '🔍 Scan for duplicates';
      return;
    }

    // Scan results
    if (totalDups === 0) {
      resultEl.innerHTML = `<div style="background:#ECFDF5;border:1px solid #6EE7B7;border-radius:8px;padding:14px 16px;font-size:13px;color:#065F46;">✓ All clean — no duplicates found across 20 folders and all link stores.</div>`;
      if (deleteBtn) deleteBtn.style.display = 'none';
    } else {
      let html = `<div style="background:#FEF3C7;border:1px solid #FCD34D;border-radius:8px;padding:14px 16px;margin-bottom:12px;font-size:13px;color:#92400E;">
        ⚠ Found <strong>${totalDups}</strong> duplicate group${totalDups !== 1 ? 's' : ''} — ${fileDups.length} file, ${linkDups.length} link.
      </div>`;

      if (fileDups.length) {
        html += `<div style="font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">File Duplicates</div>`;
        html += fileDups.map(d => `
          <div class="request-card" style="margin-bottom:8px;">
            <div class="request-filename">${d.name}</div>
            <div class="request-meta" style="margin-top:4px;"><span class="meta-pill">${d.location}</span> <span style="font-size:11px;color:#64748B;">${d.count} copies — will keep newest</span></div>
          </div>`).join('');
      }

      if (linkDups.length) {
        html += `<div style="font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:0.06em;margin:12px 0 8px;">Link Duplicates</div>`;
        html += linkDups.map(d => `
          <div class="request-card" style="margin-bottom:8px;">
            <div class="request-filename">${d.name}</div>
            <div class="request-meta" style="margin-top:4px;"><a href="${d.url}" target="_blank" style="font-size:11px;color:#0B1F35;">${d.url.slice(0,60)}${d.url.length > 60 ? '…' : ''} ↗</a></div>
            <div style="font-size:11px;color:#64748B;margin-top:2px;">${d.count} copies in ${d.store} — will keep newest</div>
          </div>`).join('');
      }

      resultEl.innerHTML = html;
      if (deleteBtn) { deleteBtn.style.display = 'inline-block'; deleteBtn.disabled = false; deleteBtn.textContent = `🗑 Remove all ${totalDups} duplicate${totalDups !== 1 ? 's' : ''}`; }
    }

    scanBtn.disabled = false; scanBtn.textContent = '🔍 Scan for duplicates';
    if (data.errors?.length) console.warn('Dedup errors:', data.errors);
  } catch(err) {
    resultEl.innerHTML = `<div style="color:#DC2626;font-size:13px;">Error: ${err.message}</div>`;
    scanBtn.disabled = false; scanBtn.textContent = '🔍 Scan for duplicates';
    if (deleteBtn) { deleteBtn.disabled = false; }
  }
}

// Init
document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div>Loading…</div>';
checkAuth().then(data => {
  if (!data) { renderLogin(); return; }
  renderDashboard(data);
});
</script>
</body>
</html>
